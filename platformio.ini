; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32-p4


[env:esp32-p4]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-p4
framework = arduino
board_build.filesystem = littlefs
board_build.partitions = partitions_ota.csv
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
extra_scripts =
	pre:tools/fix_riscv_toolchain.py
build_unflags = -DARDUINO_USB_MODE -DARDUINO_USB_CDC_ON_BOOT
build_flags =
	-D LED_PIN=1
	-D RESET_BUTTON_PIN=46
	-D AMPLIFIER_PIN=27
	-D BUZZER_PIN=45
	-D I2S_BCK_PIN=20
	-D I2S_DOUT_PIN=23
	-D I2S_DOUT2_PIN=25
	-D I2S_LRC_PIN=21
	-D I2S_MCLK_PIN=22
	-D SIGGEN_PWM_PIN=47
	-D CORE_DEBUG_LEVEL=2
	-D CONFIG_ARDUHAL_LOG_COLORS=1
	-Os
	-D DSP_ENABLED
	-D DAC_ENABLED
	-D I2S_TX_DATA_PIN=24
	-D DAC_I2C_SDA_PIN=48
	-D DAC_I2C_SCL_PIN=54
	-D TFT_MOSI_PIN=2
	-D TFT_SCLK_PIN=3
	-D TFT_CS_PIN=4
	-D TFT_DC_PIN=5
	-D TFT_RST_PIN=6
	-D TFT_BL_PIN=26
	-D ENCODER_A_PIN=32
	-D ENCODER_B_PIN=33
	-D ENCODER_SW_PIN=36
	-D USB_AUDIO_ENABLED
	-D ARDUINO_USB_MODE=0
	-D ARDUINO_USB_CDC_ON_BOOT=0
	-Wl,--wrap=tud_descriptor_bos_cb
	-D GUI_ENABLED
	-D LV_CONF_INCLUDE_SIMPLE
	-I src/gui
	-D WEBSOCKETS_MAX_DATA_SIZE=4096
lib_deps =
	bblanchon/ArduinoJson@^7.4.2
	knolleary/PubSubClient@^2.8
	lovyan03/LovyanGFX@^1.2.0
	lvgl/lvgl@^9.4
lib_ignore = esp_dsp_lite
monitor_speed = 115200
monitor_filters = direct
upload_port = COM8
monitor_port = COM8
test_ignore = *


[env:p4_hosted_update]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-p4
framework = arduino
board_build.partitions = partitions_ota.csv
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
extra_scripts =
	pre:tools/fix_riscv_toolchain.py
build_unflags = -DARDUINO_USB_MODE -DARDUINO_USB_CDC_ON_BOOT
build_flags =
	-D ARDUINO_USB_MODE=0
	-D ARDUINO_USB_CDC_ON_BOOT=0
	-D CORE_DEBUG_LEVEL=3
build_src_filter = -<*> +<../test/p4_hosted_update/>
monitor_speed = 115200
monitor_filters = direct
upload_port = COM8
monitor_port = COM8
test_ignore = *

[env:native]
platform = native
test_framework = unity
build_flags = 
	-std=c++11
	-D UNIT_TEST
	-D NATIVE_TEST
	-D DSP_ENABLED
	-D DSP_MAX_STAGES=24
	-D DSP_PEQ_BANDS=10
	-D DSP_MAX_FIR_TAPS=256
	-D DSP_MAX_FIR_SLOTS=2
	-D DSP_MAX_DELAY_SLOTS=2
	-D DSP_MAX_DELAY_SAMPLES=4800
	-D DSP_MAX_CHANNELS=4
	-D DSP_DEFAULT_Q=0.707f
	-D DSP_CPU_WARN_PERCENT=80.0f
	-D DAC_ENABLED
	-D USB_AUDIO_ENABLED
lib_deps = 
	bblanchon/ArduinoJson@^7.4.2
	kosme/arduinoFFT@^2.0
lib_compat_mode = off
test_ignore = test_mocks
test_build_src = no
