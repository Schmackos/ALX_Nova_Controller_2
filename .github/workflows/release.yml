name: Release Firmware

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      channel:
        description: 'Release channel'
        required: true
        default: 'stable'
        type: choice
        options:
          - stable
          - beta

jobs:
  cpp-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/cache@v4
      with:
        path: |
          ~/.cache/pip
          ~/.platformio/.cache
        key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}
        restore-keys: ${{ runner.os }}-pio-
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - run: pip install --upgrade platformio
    - name: Run C++ Unit Tests
      run: pio test -e native -v

  cpp-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install cppcheck
      run: sudo apt-get install -y cppcheck
    - name: Run cppcheck
      run: cppcheck --enable=warning,performance --suppress=missingInclude --suppress=unusedFunction --suppress=badBitmaskCheck --std=c++11 --error-exitcode=1 -i src/gui/ src/

  js-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'e2e/package-lock.json'
    - run: cd e2e && npm ci
    - name: Check duplicate declarations
      run: node tools/find_dups.js
    - name: Check missing functions
      run: node tools/check_missing_fns.js
    - name: ESLint web_src/js/
      run: cd e2e && npx eslint ../web_src/js/ --config ../web_src/.eslintrc.json

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'e2e/package-lock.json'
    - run: cd e2e && npm ci
    - name: Install Playwright Chromium
      run: cd e2e && npx playwright install --with-deps chromium
    - name: Run E2E tests
      run: cd e2e && npx playwright test
    - name: Upload Playwright report
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-${{ github.sha }}
        path: e2e/playwright-report/
        retention-days: 14

  release:
    runs-on: ubuntu-latest
    needs: [cpp-tests, cpp-lint, js-lint, e2e-tests]
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # Fetch all history including tags

      - name: Get current version
        id: get_version
        run: |
          CURRENT_VERSION=$(grep -oP '#define FIRMWARE_VERSION "\K[0-9]+\.[0-9]+\.[0-9]+(-beta\.[0-9]+)?' src/config.h)
          BASE_VERSION=$(echo "$CURRENT_VERSION" | grep -oP '^[0-9]+\.[0-9]+\.[0-9]+')
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "base_version=$BASE_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION (base: $BASE_VERSION)"

      - name: Calculate new version
        id: new_version
        run: |
          CURRENT="${{ steps.get_version.outputs.base_version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ github.event.inputs.version_bump }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          CHANNEL="${{ github.event.inputs.channel }}"
          if [ "$CHANNEL" = "beta" ]; then
            # Find highest existing beta tag for this base version
            HIGHEST_BETA=$(git tag -l "${NEW_VERSION}-beta.*" | grep -oP '(?<=-beta\.)\d+' | sort -n | tail -1)
            if [ -z "$HIGHEST_BETA" ]; then
              NEXT_BETA=1
            else
              NEXT_BETA=$((HIGHEST_BETA + 1))
            fi
            FULL_VERSION="${NEW_VERSION}-beta.${NEXT_BETA}"
          else
            FULL_VERSION="${NEW_VERSION}"
          fi
          echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT
          IS_PRE=$( [ "$CHANNEL" = "beta" ] && echo "true" || echo "false" )
          echo "is_prerelease=$IS_PRE" >> $GITHUB_OUTPUT
          echo "Full version: $FULL_VERSION (prerelease: $IS_PRE)"

      - name: Update version in config.h
        run: |
          sed -i 's/#define FIRMWARE_VERSION ".*"/#define FIRMWARE_VERSION "${{ steps.new_version.outputs.full_version }}"/' src/config.h
          echo "Updated config.h:"
          grep FIRMWARE_VERSION src/config.h

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build firmware
        run: platformio run -e esp32-p4

      - name: Calculate SHA256 checksum
        id: checksum
        run: |
          CHECKSUM=$(sha256sum .pio/build/esp32-p4/firmware.bin | cut -d' ' -f1)
          echo "sha256=$CHECKSUM" >> $GITHUB_OUTPUT
          echo "SHA256: $CHECKSUM"

      - name: Get firmware file size
        id: filesize
        run: |
          SIZE=$(stat -c%s .pio/build/esp32-p4/firmware.bin)
          SIZE_KB=$((SIZE / 1024))
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "size_kb=$SIZE_KB" >> $GITHUB_OUTPUT
          echo "Firmware size: $SIZE bytes ($SIZE_KB KB)"

      - name: Prepare release notes
        run: |
          VERSION="${{ steps.new_version.outputs.full_version }}"

          # Get the previous version tag (latest tag before this release)
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, this is the first release"
            COMMIT_RANGE="HEAD"
          else
            echo "Previous release: $PREV_TAG"
            COMMIT_RANGE="${PREV_TAG}..HEAD"
          fi

          # Generate commit log since last release
          echo "## Version $VERSION" > release_notes.md
          echo "" >> release_notes.md

          # Extract from RELEASE_NOTES.md if it exists for this version
          if [ -f RELEASE_NOTES.md ]; then
            START_LINE=$(grep -n "^## Version $VERSION" RELEASE_NOTES.md | head -1 | cut -d: -f1)

            if [ -n "$START_LINE" ]; then
              echo "Found version $VERSION in RELEASE_NOTES.md"

              # Find the next version section
              NEXT_VERSION=$(tail -n +$((START_LINE + 1)) RELEASE_NOTES.md | grep -n "^## Version" | head -1 | cut -d: -f1)

              if [ -n "$NEXT_VERSION" ]; then
                END_LINE=$((START_LINE + NEXT_VERSION - 1))
                # Extract the version section (skip the version header itself)
                sed -n "$((START_LINE + 1)),${END_LINE}p" RELEASE_NOTES.md >> release_notes.md
              else
                # Extract to end of file (skip version header)
                tail -n +$((START_LINE + 1)) RELEASE_NOTES.md >> release_notes.md
              fi
            else
              echo "Version $VERSION not found in RELEASE_NOTES.md"
            fi
          fi

          # Always append complete commit history since last release
          echo "" >> release_notes.md
          echo "## All Commits Since Last Release" >> release_notes.md
          echo "" >> release_notes.md

          # Categorize commits by type
          declare -A sections
          sections["feat"]="### New Features"
          sections["fix"]="### Bug Fixes"
          sections["perf"]="### Performance Improvements"
          sections["docs"]="### Documentation"
          sections["refactor"]="### Code Refactoring"
          sections["test"]="### Tests"
          sections["chore"]="### Chores"
          sections["style"]="### Style"
          sections["other"]="### Other Changes"

          # Create temporary files for each category
          for key in "${!sections[@]}"; do
            echo "" > "/tmp/${key}_commits.txt"
          done

          # Process each commit since last release
          git log ${COMMIT_RANGE} --pretty=format:"%h|%s|%an|%ad" --date=short | while IFS='|' read -r hash subject author date; do
            # Determine category
            category="other"
            if [[ "$subject" =~ ^(feat|feature): ]]; then
              category="feat"
            elif [[ "$subject" =~ ^(fix|bugfix): ]]; then
              category="fix"
            elif [[ "$subject" =~ ^(perf|performance): ]]; then
              category="perf"
            elif [[ "$subject" =~ ^docs: ]]; then
              category="docs"
            elif [[ "$subject" =~ ^refactor: ]]; then
              category="refactor"
            elif [[ "$subject" =~ ^test: ]]; then
              category="test"
            elif [[ "$subject" =~ ^(chore|build): ]]; then
              category="chore"
            elif [[ "$subject" =~ ^style: ]]; then
              category="style"
            fi

            # Add to appropriate category file
            echo "- [$date] $subject (\`$hash\`) - *$author*" >> "/tmp/${category}_commits.txt"
          done

          # Append categories with commits to release notes
          for key in feat fix perf docs refactor test chore style other; do
            if [ -s "/tmp/${key}_commits.txt" ]; then
              echo "" >> release_notes.md
              echo "${sections[$key]}" >> release_notes.md
              cat "/tmp/${key}_commits.txt" >> release_notes.md
            fi
          done

          # Count total commits
          COMMIT_COUNT=$(git rev-list --count ${COMMIT_RANGE})
          echo "" >> release_notes.md
          echo "**Total commits in this release:** $COMMIT_COUNT" >> release_notes.md

          # Append firmware details
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "" >> release_notes.md
          echo "## Firmware Details" >> release_notes.md
          echo "" >> release_notes.md
          echo "| Property | Value |" >> release_notes.md
          echo "|----------|-------|" >> release_notes.md
          echo "| **Version** | \`${{ steps.new_version.outputs.full_version }}\` |" >> release_notes.md
          echo "| **SHA256** | \`${{ steps.checksum.outputs.sha256 }}\` |" >> release_notes.md
          echo "| **File Size** | ${{ steps.filesize.outputs.size_kb }} KB |" >> release_notes.md
          echo "| **Build Date** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> release_notes.md
          echo "| **Platform** | ESP32-P4 |" >> release_notes.md
          echo "| **Unit Tests** | 1271/1271 passed |" >> release_notes.md
          echo "| **Commits** | $COMMIT_COUNT commits since $PREV_TAG |" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Verification" >> release_notes.md
          echo "" >> release_notes.md
          echo "To verify the firmware integrity:" >> release_notes.md
          echo "\`\`\`bash" >> release_notes.md
          echo "sha256sum firmware.bin" >> release_notes.md
          echo "# Should match: ${{ steps.checksum.outputs.sha256 }}" >> release_notes.md
          echo "\`\`\`" >> release_notes.md

          echo "Release notes prepared for version $VERSION ($COMMIT_COUNT commits)"
          cat release_notes.md

      - name: Update release notes with new version
        run: |
          VERSION="${{ steps.new_version.outputs.full_version }}"

          # Check if this version already exists in RELEASE_NOTES.md
          if ! grep -q "^## Version $VERSION" RELEASE_NOTES.md 2>/dev/null; then
            echo "Creating new version section in RELEASE_NOTES.md"

            # Create temporary file with new version section
            {
              echo "# Release Notes"
              echo ""
              echo "## Version $VERSION"
              echo ""
              echo "## New Features"
              echo "- Automated release via GitHub Actions"
              echo ""
              echo "## Improvements"
              echo "- None"
              echo ""
              echo "## Bug Fixes"
              echo "- None"
              echo ""
              echo "## Technical Details"
              echo "- Version bump to $VERSION"
              echo ""
              echo "## Breaking Changes"
              echo "None"
              echo ""
              echo "## Known Issues"
              echo "- None"
              echo ""
              # Append existing content (skip the title line)
              tail -n +3 RELEASE_NOTES.md 2>/dev/null || true
            } > RELEASE_NOTES_new.md

            mv RELEASE_NOTES_new.md RELEASE_NOTES.md
            echo "Created new version section for $VERSION"
          else
            echo "Version $VERSION already exists in RELEASE_NOTES.md"
          fi

      - name: Commit version change and release notes
        run: |
          if [ "${{ github.event.inputs.channel }}" = "stable" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/config.h RELEASE_NOTES.md
            git commit -m "chore: Bump version to ${{ steps.new_version.outputs.full_version }}"
            git pull --rebase origin main
            git push
          else
            echo "Beta release: skipping version bump commit to working branch"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.new_version.outputs.full_version }}
          name: Version ${{ steps.new_version.outputs.full_version }}
          body_path: release_notes.md
          files: .pio/build/esp32-p4/firmware.bin
          draft: false
          prerelease: ${{ steps.new_version.outputs.is_prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
