name: Quality Gates

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  cpp-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/cache@v4
      with:
        path: |
          ~/.cache/pip
          ~/.platformio/.cache
        key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}
        restore-keys: ${{ runner.os }}-pio-
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - run: pip install --upgrade platformio
    - name: Run C++ Unit Tests
      run: pio test -e native -v

  cpp-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install cppcheck
      run: sudo apt-get install -y cppcheck
    - name: Run cppcheck
      run: cppcheck --enable=warning,performance --suppress=missingInclude --suppress=unusedFunction --suppress=badBitmaskCheck --std=c++11 --error-exitcode=1 -i src/gui/ src/

  js-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'e2e/package-lock.json'
    - run: cd e2e && npm ci
    - name: Check duplicate declarations
      run: node tools/find_dups.js
    - name: Check missing functions
      run: node tools/check_missing_fns.js
    - name: ESLint web_src/js/
      run: cd e2e && npx eslint ../web_src/js/ --config ../web_src/.eslintrc.json
    - name: Validate architecture diagrams
      run: node tools/diagram-validation.js

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'e2e/package-lock.json'
    - run: cd e2e && npm ci
    - name: Install Playwright Chromium
      run: cd e2e && npx playwright install --with-deps chromium
    - name: Run E2E tests
      run: cd e2e && npx playwright test
    - name: Upload Playwright report
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-${{ github.sha }}
        path: e2e/playwright-report/
        retention-days: 14

  doc-coverage:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Check doc mapping coverage
      run: node tools/check_mapping_coverage.js

  build:
    runs-on: ubuntu-latest
    needs: [cpp-tests, cpp-lint, js-lint, e2e-tests, doc-coverage]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/cache@v4
      with:
        path: |
          ~/.cache/pip
          ~/.platformio/.cache
        key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}
        restore-keys: ${{ runner.os }}-pio-
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - run: pip install --upgrade platformio
    - name: Build Firmware
      run: pio run -e esp32-p4
    - uses: actions/upload-artifact@v4
      with:
        name: firmware-${{ github.sha }}
        path: .pio/build/esp32-p4/firmware.bin
        retention-days: 30
