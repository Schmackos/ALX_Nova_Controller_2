name: AI Fix Attempt

on:
  issues:
    types: [labeled]

jobs:
  attempt-fix:
    if: >
      contains(github.event.issue.labels.*.name, 'device-test') &&
      startsWith(github.event.label.name, 'area:')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      # NOTE: The action name below is a placeholder. Verify the correct GitHub Action
      # name and version for Gemini integration before enabling this workflow in
      # production. Check https://github.com/google-gemini for the current published action.
      - name: Analyze and create fix PR
        uses: google-gemini/gemini-github-models@v1
        with:
          model: gemini-2.0-flash
          issue-number: ${{ github.event.issue.number }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Comment if fix failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Automated fix attempt failed. Manual investigation needed.\n\nWorkflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            });
