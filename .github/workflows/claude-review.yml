name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, develop]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff and project context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr_diff.txt
          if [ -f REVIEW.md ]; then
            cat REVIEW.md > /tmp/review_context.txt
          else
            echo "No REVIEW.md found" > /tmp/review_context.txt
          fi

      - name: Run AI review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Build JSON payload via Python to avoid shell argument limits
          python3 << 'PYEOF'
          import json

          with open('/tmp/pr_diff.txt') as f:
              diff = f.read()
          with open('/tmp/review_context.txt') as f:
              context = f.read()

          prompt = """You are a senior code reviewer for an ESP32-P4 embedded audio controller project (C++, PlatformIO, Arduino framework).

          Review the following pull request diff for:
          1. Logic errors and bugs that could break production
          2. Security vulnerabilities (OWASP top 10, command injection, XSS)
          3. Regressions in existing functionality
          4. Memory safety issues (buffer overflows, use-after-free, heap exhaustion)
          5. Concurrency bugs (race conditions, missing volatile, ISR safety)

          Focus on correctness over style.
          Tag each finding with severity: "BUG:" for must-fix, "NIT:" for minor, "SECURITY:" for vulnerabilities.
          Reference specific file paths and line numbers.
          If no issues found, respond with: "No issues found."
          """

          payload = {
              "contents": [{"parts": [
                  {"text": prompt},
                  {"text": "Project review guidelines:\n" + context},
                  {"text": "\nPull request diff:\n" + diff}
              ]}],
              "generationConfig": {"temperature": 0.2, "maxOutputTokens": 4096}
          }

          with open('/tmp/gemini_payload.json', 'w') as f:
              json.dump(payload, f)
          PYEOF

          # Call Gemini API with file-based payload
          curl -s "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H 'Content-Type: application/json' \
            -d @/tmp/gemini_payload.json > /tmp/gemini_response.json

          # Extract the text response
          python3 -c "
          import json
          with open('/tmp/gemini_response.json') as f:
              data = json.load(f)
          if 'candidates' in data and data['candidates']:
              parts = data['candidates'][0].get('content', {}).get('parts', [])
              print(''.join(p.get('text', '') for p in parts))
          elif 'error' in data:
              print('API Error: ' + data['error'].get('message', 'Unknown error'))
          else:
              print('No response generated')
          " > /tmp/review_output.txt

      - name: Post review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "## AI Code Review"
            echo ""
            cat /tmp/review_output.txt
            echo ""
            echo "---"
            echo "*Automated review by Gemini 2.5 Flash*"
          } > /tmp/review_comment.txt

          gh pr comment ${{ github.event.pull_request.number }} \
            --body-file /tmp/review_comment.txt

  respond:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get comment and respond
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "issues" ]; then
            COMMENT_BODY=$(gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }} --jq '.body')
            ISSUE_NUMBER=${{ github.event.issue.number }}
          elif [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
            COMMENT_BODY=$(gh api repos/${{ github.repository }}/pulls/comments/${{ github.event.comment.id }} --jq '.body')
            ISSUE_NUMBER=${{ github.event.pull_request.number }}
          else
            COMMENT_BODY=$(gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }} --jq '.body')
            ISSUE_NUMBER=${{ github.event.issue.number }}
          fi

          USER_MESSAGE=$(echo "$COMMENT_BODY" | sed 's/@claude[[:space:]]*//')

          # Build JSON payload via Python
          echo "$USER_MESSAGE" > /tmp/user_message.txt
          python3 << 'PYEOF'
          import json
          with open('/tmp/user_message.txt') as f:
              msg = f.read()
          payload = {
              "contents": [{"parts": [
                  {"text": "You are helping with the ALX Nova Controller 2 project (ESP32-P4 audio controller, C++, PlatformIO). A user asked: "},
                  {"text": msg},
                  {"text": "\nRespond helpfully and concisely."}
              ]}],
              "generationConfig": {"temperature": 0.3, "maxOutputTokens": 2048}
          }
          with open('/tmp/gemini_payload.json', 'w') as f:
              json.dump(payload, f)
          PYEOF

          curl -s "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H 'Content-Type: application/json' \
            -d @/tmp/gemini_payload.json > /tmp/gemini_response.json

          python3 -c "
          import json
          with open('/tmp/gemini_response.json') as f:
              data = json.load(f)
          if 'candidates' in data and data['candidates']:
              parts = data['candidates'][0].get('content', {}).get('parts', [])
              print(''.join(p.get('text', '') for p in parts))
          elif 'error' in data:
              print('API Error: ' + data['error'].get('message', 'Unknown error'))
          else:
              print('No response generated')
          " > /tmp/response.txt

          {
            cat /tmp/response.txt
            echo ""
            echo "---"
            echo "*Response by Gemini 2.5 Flash*"
          } > /tmp/response_comment.txt

          gh issue comment "$ISSUE_NUMBER" \
            --repo ${{ github.repository }} \
            --body-file /tmp/response_comment.txt
