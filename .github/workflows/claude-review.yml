name: Claude Code Review

on:
  # Auto-review on PR open and every push
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, develop]
  # Respond to @claude mentions
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  # Respond to @claude in new issues
  issues:
    types: [opened]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  # Auto-review on PR events
  review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this pull request for:
            1. Logic errors and bugs that could break production
            2. Security vulnerabilities (OWASP top 10, command injection, XSS)
            3. Regressions in existing functionality
            4. Memory safety issues (buffer overflows, use-after-free, heap exhaustion)
            5. Concurrency bugs (race conditions, missing volatile, ISR safety)
            6. Violations of the project's CLAUDE.md and REVIEW.md guidelines

            Focus on correctness over style. Post findings as review comments on specific lines.
            Tag severity: "BUG:" for must-fix, "NIT:" for minor, "SECURITY:" for vulnerabilities.
          claude_args: "--max-turns 10 --model claude-sonnet-4-6"

  # Interactive @claude responses on comments
  respond:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--max-turns 10 --model claude-sonnet-4-6"
