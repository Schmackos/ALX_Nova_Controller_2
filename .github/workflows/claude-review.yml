name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, develop]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the PR diff
          gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr_diff.txt

          # Build the review prompt with diff appended
          cat <<'PROMPT' > /tmp/review_prompt.txt
          Review this pull request diff for:
          1. Logic errors and bugs that could break production
          2. Security vulnerabilities (OWASP top 10, command injection, XSS)
          3. Regressions in existing functionality
          4. Memory safety issues (buffer overflows, use-after-free, heap exhaustion)
          5. Concurrency bugs (race conditions, missing volatile, ISR safety)
          6. Violations of the project's CLAUDE.md and REVIEW.md guidelines

          Focus on correctness over style.
          Tag severity: "BUG:" for must-fix, "NIT:" for minor, "SECURITY:" for vulnerabilities.
          Reference specific file paths and line numbers where issues are found.

          If no issues found, respond with exactly: "No issues found."

          Here is the diff:
          PROMPT
          cat /tmp/pr_diff.txt >> /tmp/review_prompt.txt

          # Run Claude in non-interactive print mode
          claude --print \
            --model claude-sonnet-4-6 \
            --max-turns 5 \
            < /tmp/review_prompt.txt > /tmp/review_output.txt 2>&1 || true

      - name: Post review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Post review output as PR comment
          {
            echo "## Claude Code Review"
            echo ""
            cat /tmp/review_output.txt
            echo ""
            echo "---"
            echo "*Automated review by Claude Code CLI*"
          } > /tmp/review_comment.txt

          gh pr comment ${{ github.event.pull_request.number }} \
            --body-file /tmp/review_comment.txt

  respond:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Get comment and respond
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Determine the issue/PR number and comment body
          if [ "${{ github.event_name }}" = "issues" ]; then
            COMMENT_BODY=$(gh api repos/${{ github.repository }}/issues/${{ github.event.issue.number }} --jq '.body')
            ISSUE_NUMBER=${{ github.event.issue.number }}
          elif [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
            COMMENT_BODY=$(gh api repos/${{ github.repository }}/pulls/comments/${{ github.event.comment.id }} --jq '.body')
            ISSUE_NUMBER=${{ github.event.pull_request.number }}
          else
            COMMENT_BODY=$(gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }} --jq '.body')
            ISSUE_NUMBER=${{ github.event.issue.number }}
          fi

          # Strip @claude prefix
          USER_MESSAGE=$(echo "$COMMENT_BODY" | sed 's/@claude[[:space:]]*//')

          # Build context prompt
          cat <<EOF > /tmp/respond_prompt.txt
          You are helping with the ALX Nova Controller 2 project.
          A user commented on a GitHub issue/PR and mentioned @claude.
          Read the CLAUDE.md and REVIEW.md in this repository for project context.

          Their message: ${USER_MESSAGE}

          Respond helpfully based on the codebase context. Be concise.
          EOF

          # Run Claude
          claude --print \
            --model claude-sonnet-4-6 \
            --max-turns 5 \
            < /tmp/respond_prompt.txt > /tmp/response.txt 2>&1 || true

          # Post response
          {
            cat /tmp/response.txt
            echo ""
            echo "---"
            echo "*Response by Claude Code CLI*"
          } > /tmp/response_comment.txt

          gh issue comment "$ISSUE_NUMBER" \
            --repo ${{ github.repository }} \
            --body-file /tmp/response_comment.txt
