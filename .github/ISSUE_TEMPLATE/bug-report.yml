name: Bug Report
description: Report a bug with the ALX Nova Controller 2
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: firmware
    attributes:
      label: Firmware Version
      placeholder: "1.12.3"
  - type: dropdown
    id: hardware
    attributes:
      label: Hardware Setup
      options:
        - Base board only (Waveshare ESP32-P4 dev kit)
        - Base board + expansion ADC mezzanine
        - Base board + expansion DAC mezzanine
        - Base board + dual mezzanine (ADC + DAC)
  - type: textarea
    id: logs
    attributes:
      label: Serial Logs
      description: Relevant serial output (optional)
      render: shell
