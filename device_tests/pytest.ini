[pytest]
testpaths = tests
markers =
    boot: boot health verification
    reboot: test requires device reboot (deselect with -m "not reboot")
    slow: slow test (deselect with -m "not slow")
    settings: settings persistence tests
    mqtt: requires MQTT broker configuration
    hal: HAL device tests
    health: health check endpoint tests
    audio: audio pipeline tests
    network: network connectivity tests
    ws: WebSocket protocol tests
    wifi: WiFi management tests
    ethernet: Ethernet management tests
    ota: OTA/firmware update tests (read-only)
    dsp: DSP pipeline tests
    sync: REST-to-WebSocket state sync tests
    perf: response time performance assertions
    stress: concurrent load stress tests
addopts = --timeout=120 -v --html=logs/report.html --self-contained-html
